<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Around the World — Country Quiz</title>
<link rel="stylesheet" href="style.css?v=8">
</head>
<body>
<header>
  <h1 id="title" tabindex="0">🌍 Around the World</h1>
  <div id="hud" class="hidden">
    <span class="hud-item">Q <b id="hud-q">1</b>/<span id="hud-total">15</span></span>
    <span class="hud-item">Score <b id="hud-score">0</b></span>
    <span class="hud-item">Streak <b id="hud-streak">0</b></span>
    <span class="hud-item">⏱ <b id="hud-time">0.0</b>s</span>
    <button id="quit-btn" class="ghost small">Quit</button>
  </div>
</header>

<main id="app">
  <!-- HOME -->
  <section id="home" class="screen">
    <p class="tagline">Learn world countries and US states. Pick a level.</p>

    <h2 class="sec-head">🌍 Around the World</h2>
    <div class="levels" id="levels-world">
      <button class="level-card" data-section="world" data-mode="mc" data-scope="region">
        <span class="lvl-num">1</span>
        <span class="lvl-name">Region · Multiple Choice</span>
        <span class="lvl-desc">Pick continents. Highlighted country, 5 options.</span>
        <span class="lvl-best"></span>
      </button>
      <button class="level-card" data-section="world" data-mode="free" data-scope="region">
        <span class="lvl-num">2</span>
        <span class="lvl-name">Region · Free Type</span>
        <span class="lvl-desc">Same regions, no options — type the name.</span>
        <span class="lvl-best"></span>
      </button>
      <button class="level-card" data-section="world" data-mode="mc" data-scope="all">
        <span class="lvl-num">3</span>
        <span class="lvl-name">World · Multiple Choice</span>
        <span class="lvl-desc">All countries, 5 options each.</span>
        <span class="lvl-best"></span>
      </button>
      <button class="level-card" data-section="world" data-mode="free" data-scope="all">
        <span class="lvl-num">4</span>
        <span class="lvl-name">World · Free Type</span>
        <span class="lvl-desc">All countries, randomized, type the name.</span>
        <span class="lvl-best"></span>
      </button>
      <button class="level-card" data-section="world" data-mode="find" data-scope="region">
        <span class="lvl-num">5</span>
        <span class="lvl-name">Region · Find on Map</span>
        <span class="lvl-desc">Get a name — tap it on the map. Pick continents.</span>
        <span class="lvl-best"></span>
      </button>
    </div>

    <h2 class="sec-head">🇺🇸 United States</h2>
    <div class="levels" id="levels-us">
      <button class="level-card" data-section="us" data-mode="mc">
        <span class="lvl-num">1</span>
        <span class="lvl-name">States · Multiple Choice</span>
        <span class="lvl-desc">Highlighted state, 5 options. All 50 states.</span>
        <span class="lvl-best"></span>
      </button>
      <button class="level-card" data-section="us" data-mode="free">
        <span class="lvl-num">2</span>
        <span class="lvl-name">States · Free Type</span>
        <span class="lvl-desc">Type the state name. All 50, randomized.</span>
        <span class="lvl-best"></span>
      </button>
      <button class="level-card" data-section="us" data-mode="find">
        <span class="lvl-num">3</span>
        <span class="lvl-name">States · Find on Map</span>
        <span class="lvl-desc">Get a state name — tap it on the US map.</span>
        <span class="lvl-best"></span>
      </button>
    </div>

    <button id="open-lb" class="ghost lb-home">🏆 Leaderboards</button>
  </section>

  <!-- REGION PICKER -->
  <section id="picker" class="screen hidden">
    <h2 id="picker-title">Choose your regions</h2>
    <div class="continent-buttons" id="continent-buttons"></div>
    <div class="map-wrap small-map"><svg id="picker-map" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet"></svg></div>
    <div class="picker-actions">
      <button id="picker-back" class="ghost">Back</button>
      <button id="picker-start" class="primary" disabled>Start</button>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="screen hidden">
    <div class="quiz-cols">
      <div class="quiz-left">
        <div class="map-wrap">
          <svg id="quiz-map" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet"></svg>
          <div class="zoom-ctl">
            <button id="zoom-in" aria-label="Zoom in">+</button>
            <button id="zoom-out" aria-label="Zoom out">−</button>
            <button id="zoom-reset" aria-label="Reset view">⤢</button>
          </div>
        </div>
      </div>
      <div class="quiz-right">
        <p id="prompt" class="prompt">Which one is highlighted?</p>
        <div id="options" class="options"></div>
        <form id="free-form" class="free-form hidden" autocomplete="off">
          <input id="free-input" type="text" placeholder="Type the name…" autocapitalize="words" spellcheck="false">
          <button type="submit" class="primary">Guess</button>
          <button type="button" id="free-skip" class="ghost">Reveal</button>
        </form>
        <div id="reveal" class="reveal hidden"></div>
      </div>
    </div>
  </section>

  <!-- RESULTS -->
  <section id="results" class="screen hidden">
    <h2 id="results-head">Round Complete</h2>
    <div id="results-body" class="results-grid"></div>
    <div id="newhigh" class="newhigh hidden">🏆 New session high score!</div>
    <div class="lb-save" id="lb-save">
      <input id="lb-name" maxlength="16" placeholder="Proud of it? Enter your name…" autocapitalize="words" spellcheck="false">
      <button id="lb-save-btn" class="primary">Add to leaderboard</button>
    </div>
    <div id="lb-inline"></div>
    <div class="picker-actions">
      <button id="results-home" class="ghost">Home</button>
      <button id="results-again" class="primary">Play again</button>
    </div>
  </section>

  <!-- LEADERBOARD -->
  <section id="leaderboard" class="screen hidden">
    <h2>🏆 Leaderboards</h2>
    <select id="lb-pick"></select>
    <div class="lb-sort" id="lb-sort">
      <button data-by="score" class="on">Score</button>
      <button data-by="streak">Best Streak</button>
      <button data-by="acc">Accuracy</button>
      <button data-by="avg">Speed</button>
    </div>
    <div id="lb-table"></div>
    <div class="picker-actions"><button id="lb-back" class="ghost">Back</button></div>
  </section>

  <div id="loading" class="screen">Loading the world…</div>
</main>

<script src="app.js?v=8"></script>
</body>
</html>
